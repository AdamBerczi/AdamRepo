<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="color-scheme" content="dark light" />
  <title>Home</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>◐</text></svg>" />
  <link rel="preconnect" href="https://api.open-meteo.com" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;650;700&family=Instrument+Serif:ital@0;1&display=swap" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- Atmospheric scene: sun, clouds, mountain ridge — driven by app.js -->
  <div class="scene" aria-hidden="true">
    <div class="scene__sun"></div>
    <div class="scene__clouds">
      <span class="cloud c1"></span><span class="cloud c2"></span>
      <span class="cloud c3"></span><span class="cloud c4"></span>
    </div>
    <div class="scene__ridge">
      <svg viewBox="0 0 1440 320" preserveAspectRatio="none">
        <path class="ridge ridge--back" d="M0,220 L160,170 L320,210 L470,150 L640,200 L800,140 L980,195 L1150,150 L1320,200 L1440,170 L1440,320 L0,320 Z"/>
        <path class="ridge ridge--front" d="M0,270 L120,235 L260,275 L420,210 L560,260 L720,205 L900,265 L1080,220 L1260,270 L1440,235 L1440,320 L0,320 Z"/>
      </svg>
    </div>
    <div class="scene__vignette"></div>
  </div>

  <!-- Top bar (taskbar-style) -->
  <header class="topbar">
    <div class="topbar__group">
      <span class="tb-brand">◐</span>
      <span class="tb-greeting" id="greeting">Hello</span>
    </div>
    <div class="topbar__group topbar__right">
      <span class="tb-wx" id="tbWeather"></span>
      <span class="tb-sep"></span>
      <span class="tb-clock" id="clock">––:––</span>
      <span class="tb-date" id="date"></span>
      <button class="ghost-btn ghost-btn--sm" id="themeBtn" title="Toggle theme" aria-label="Toggle theme">◐</button>
    </div>
  </header>

  <main class="dash" id="dash">
    <section class="grid">
      <article class="card card--weather" id="weatherCard">
        <div class="card__head"><h2>Weather</h2><span class="card__sub" id="weatherLoc"></span></div>
        <div class="card__body" id="weatherBody"><div class="skeleton">Loading…</div></div>
      </article>

      <article class="card card--stocks" id="stocksCard">
        <div class="card__head"><h2 id="stocksTitle">Markets</h2><span class="card__sub" id="stocksSub"></span></div>
        <div class="card__body" id="stocksBody"><div class="skeleton">Loading…</div></div>
      </article>

      <article class="card card--news" id="newsCard">
        <div class="card__head"><h2>News</h2><span class="card__sub" id="newsSub"></span></div>
        <div class="card__body" id="newsBody"><div class="skeleton">Loading…</div></div>
      </article>

      <article class="card card--calendar" id="calendarCard">
        <div class="card__head"><h2>Calendar</h2><span class="card__sub" id="calSub"></span></div>
        <div class="card__body" id="calendarBody"><div class="skeleton">Loading…</div></div>
      </article>

      <article class="card card--f1" id="f1Card">
        <div class="card__head"><h2>Formula 1</h2><span class="card__sub" id="f1Sub"></span></div>
        <div class="card__body" id="f1Body"><div class="skeleton">Loading…</div></div>
      </article>
    </section>
  </main>

  <!-- Bottom bar (taskbar-style) -->
  <footer class="bottombar">
    <div class="bottombar__group">
      <span class="bb-brand">◐ dashboard</span>
    </div>
    <div class="bottombar__group bottombar__right">
      <span id="footStatus"></span>
      <button class="ghost-btn ghost-btn--sm" id="refreshBtn" title="Refresh all">↻ refresh</button>
    </div>
  </footer>

  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
